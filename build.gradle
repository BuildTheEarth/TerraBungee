plugins {
    id 'com.github.johnrengelman.shadow' version '4.0.4'
}

allprojects {
    apply plugin: "java"
    apply plugin: "maven-publish"
    apply plugin: "com.github.johnrengelman.shadow"

    ext {
        tbVersion = "1.1.0." + ('git rev-list --count HEAD'.execute().text.trim())

        snakeYamlVersion = "1.29"
        websocketVersion = "1.5.2"
        husbyVersion = "9298199ab9"
        lombokVersion = "1.18.20"
        guavaVersion = "30.1.1-jre"
        gsonVersion = "2.8.8"
        commonsVersion = "2.11.0"
        jlineVersion = "3.20.0"
        logbackVersion = "1.3.0-alpha6"
        jdaVersion = "4.3.0_314"
        hikariVersion = "4.0.3"
    }

    group "net.buildtheearth"
    version "$tbVersion"

    tasks.withType(JavaCompile) {
        options.encoding = "UTF-8"
    }

    repositories {
        mavenCentral()
        maven {
            name = "JitPack"
            url = "https://jitpack.io/"
        }
        maven {
            name = 'papermc-repo'
            url = 'https://papermc.io/repo/repository/maven-public/'
        }
        maven {
            name = 'codemc-snapshots'
            url = 'https://repo.codemc.io/repository/maven-snapshots'
        }
        jcenter()
    }

    dependencies {
        if (!("common".equalsIgnoreCase(project.name))) {
            compile project(":common")
        }

        compileOnly "org.projectlombok:lombok:$lombokVersion"
        testCompileOnly "org.projectlombok:lombok:$lombokVersion"
        annotationProcessor "org.projectlombok:lombok:$lombokVersion"
        testAnnotationProcessor "org.projectlombok:lombok:$lombokVersion"
    }

    publishing {
        repositories {
            if (project.hasProperty("noahhusbyMavenUsername") && project.hasProperty("noahhusbyMavenPassword")) {
                maven {
                    credentials {
                        username = "$noahhusbyMavenUsername"
                        password = "$noahhusbyMavenPassword"
                    }

                    name = "buildtheearth"
                    url = "https://maven.noahhusby.com/repository/buildtheearth/"
                }
            }
        }
    }

    if (project.name.contains("api") || project.name.contains("client") || project.name.contains("common")) {
        publish.dependsOn(publishToMavenLocal)
    }

    shadowJar{
        archiveFileName = "TerraBungee-${baseName}-${version}.jar"
        manifest {
            attributes( 'Implementation-Version': "${version}" )
        }
    }

    jar {
        archiveName = "TerraBungee-${baseName}-${version}.jar"
        enabled = false
    }
    jar.finalizedBy shadowJar
}