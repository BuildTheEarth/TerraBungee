plugins {
    id 'com.github.johnrengelman.shadow' version '7.1.1'
}

allprojects {
    apply plugin: "java"
    apply plugin: "java-library"
    apply plugin: "maven-publish"
    apply plugin: "com.github.johnrengelman.shadow"

    ext {
        tbVersion = "1.1." + ('git rev-list --count HEAD'.execute().text.trim())

        snakeYamlVersion = "1.30"
        websocketVersion = "1.5.2"
        husbyVersion = "0.1.89"
        lombokVersion = "1.18.22"
        guavaVersion = "31.0.1-jre"
        gsonVersion = "2.8.9"
        commonsVersion = "2.11.0"
        jlineVersion = "3.21.0"
        logbackVersion = "1.3.0-alpha12"
        jdaVersion = "4.4.0_351"
        hikariVersion = "4.0.3"
    }

    group "net.buildtheearth.terrabungee"
    version "$tbVersion"

    tasks.withType(JavaCompile) {
        options.encoding = "UTF-8"
    }

    repositories {
        mavenCentral()
        maven { url 'https://maven.noahhusby.com/releases'}
        maven { url 'https://jitpack.io/'}
        maven { url 'https://papermc.io/repo/repository/maven-public/'}
        maven { url 'https://repo.codemc.io/repository/maven-snapshots'}
    }

    dependencies {
        if (!("common".equalsIgnoreCase(project.name))) {
            api project(":common")
        }

        compileOnly "org.projectlombok:lombok:$lombokVersion"
        testCompileOnly "org.projectlombok:lombok:$lombokVersion"
        annotationProcessor "org.projectlombok:lombok:$lombokVersion"
        testAnnotationProcessor "org.projectlombok:lombok:$lombokVersion"
    }

    if(project.name.equalsIgnoreCase("api") || project.name.equalsIgnoreCase("common") || project.name.equalsIgnoreCase("client")) {
        publishing {
            repositories {
                if (System.getenv("MAVEN_USERNAME") != null && System.getenv("MAVEN_PASSWORD")) {
                    maven {
                        credentials {
                            username = System.getenv("MAVEN_USERNAME")
                            password = System.getenv("MAVEN_PASSWORD")
                        }
                        name = "BuildTheEarth"
                        url = "https://maven.dev.buildtheearth.net/releases"
                    }
                }
            }

            publications {
                maven(MavenPublication) {
                    groupId = "net.buildtheearth.terrabungee"
                    artifactId = project.name
                    version = project.version

                    from components.java
                }
            }
        }
    }

    shadowJar {
        archiveFileName = "TerraBungee-${baseName}-${version}.jar"
        manifest {
            attributes( 'Implementation-Version': "${version}" )
        }
    }
}