dependencies {
    compile project(":api")
    compile "com.github.noahhusby:HusbyLib:$husbyVersion"
    compile "org.yaml:snakeyaml:$snakeYamlVersion"
    compile "com.google.code.gson:gson:$gsonVersion"
    compile "com.google.guava:guava:$guavaVersion"
    compile "commons-io:commons-io:$commonsVersion"
    compile "org.jline:jline:$jlineVersion"
    compile "ch.qos.logback:logback-classic:$logbackVersion"
    compile("net.dv8tion:JDA:$jdaVersion") {
        exclude module: 'opus-java'
    }
    compile "com.zaxxer:HikariCP:$hikariVersion"
    compile "org.java-websocket:Java-WebSocket:$websocketVersion"
}

repositories {
    mavenCentral() // for transitive dependencies
    maven {
        name 'm2-dv8tion'
        url 'https://m2.dv8tion.net/releases'
    }
}

jar {
    manifest {
        attributes(
                'Main-Class': 'net.buildtheearth.terrabungee.controller.TerraBungeeLauncher'
        )
    }
}