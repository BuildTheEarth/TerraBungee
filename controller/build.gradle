dependencies {
    compile project(":api")
    compile "com.github.noahhusby:HusbyLib:$husbyVersion"
    compile "org.yaml:snakeyaml:1.28"
    compile group: 'com.google.code.gson', name: 'gson', version: '2.8.6'
    compile group: 'com.google.guava', name: 'guava', version: '29.0-jre'
    compile group: 'commons-io', name: 'commons-io', version: '2.8.0'
    compile group: 'org.jline', name: 'jline', version: '3.16.0'
    compile group: 'ch.qos.logback', name: 'logback-classic', version: '1.3.0-alpha5'
    compile('net.dv8tion:JDA:4.2.0_207') {
        exclude module: 'opus-java'
    }
    compile "com.zaxxer:HikariCP:4.0.3"
    compile "org.java-websocket:Java-WebSocket:1.5.1"
}