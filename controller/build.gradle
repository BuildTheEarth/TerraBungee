plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '4.0.4'
}

group 'com.noahhusby'
version '1.0.2'
mainClassName = 'com.noahhusby.terrabungee.controller.TerraBungeeControllerApplication'

repositories {
    mavenCentral()
    jcenter()
}

dependencies {
    compile group: 'com.googlecode.json-simple', name: 'json-simple', version: '1.1'
    compile group: 'com.google.code.gson', name: 'gson', version: '2.8.6'
    compile group: 'com.google.guava', name: 'guava', version: '29.0-jre'
    compile group: 'commons-io', name: 'commons-io', version: '2.8.0'
    compile group: 'org.jline', name: 'jline', version: '3.16.0'
    compile group: 'ch.qos.logback', name: 'logback-classic', version: '1.3.0-alpha5'
    compile group: 'net.dv8tion', name: 'JDA', version: '4.2.0_207'
    compile 'io.javalin:javalin:3.10.1'
    compile fileTree(dir: 'libs', include: ['*.jar'])
    testCompile group: 'junit', name: 'junit', version: '4.12'
}

jar {
    manifest {
        attributes(
                'Main-Class': 'com.noahhusby.terrabungee.controller.TerraBungeeControllerApplication'
        )
    }
}